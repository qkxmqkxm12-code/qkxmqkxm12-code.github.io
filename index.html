<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손실금액 계산기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      background: #181818;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.4;
      margin: 0 0 10px;
    }

    .desc {
      font-size: 15px;
      line-height: 1.6;
      color: #cfcfcf;
      margin: 0 0 24px;
    }

    .card {
      background: #222;
      border-radius: 16px;
      padding: 20px 16px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      text-align: left;
    }

    .card-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 14px;
      color: #ddd;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 14px;
      background: #333;
      color: #fff;
    }

    button.calc-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #2f80ed;
      color: #fff;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
    }

    button.calc-btn:hover {
      opacity: 0.95;
    }

    .result {
      margin-top: 18px;
      padding: 16px;
      background: #2b2b2b;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.8;
      color: #fff;
    }

    .cta-box {
      background: #222;
      border-radius: 16px;
      padding: 20px 16px;
      margin-top: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .cta-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .cta-sub {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .kakao-btn {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      padding: 18px 20px;
      background: #fee500;
      color: #000;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .kakao-btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .notice {
      font-size: 13px;
      color: #8f8f8f;
      line-height: 1.5;
      margin-top: 14px;
      text-align: center;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }

      .desc {
        font-size: 14px;
      }

      .kakao-btn {
        font-size: 17px;
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>손실금액 계산기</h1>
    <p class="desc">금액을 입력하고 손실 복구에 필요한 목표값을 확인해 보세요.</p>

    <div class="card">
      <div class="card-title">계산기</div>

      <label for="lossAmount">손실 금액</label>
      <input type="number" id="lossAmount" placeholder="예: 100000" />

      <label for="profitRate">목표 수익률(%)</label>
      <input type="number" id="profitRate" placeholder="예: 10" />

      <button class="calc-btn" onclick="calculateRecovery()">계산하기</button>

      <div class="result" id="result">
        손실 금액과 목표 수익률을 입력해 주세요.
      </div>
    </div>

    <div class="cta-box">
      <div class="cta-title">카카오톡으로 바로 문의하기</div>
      <div class="cta-sub">
        계산 후 추가 상담이 필요하시면 아래 버튼을 눌러 주세요.
      </div>

      <div style="text-align:center;">
        <a
          class="kakao-btn"
          href="https://open.kakao.com/o/gdwQP0di"
          target="_blank"
          rel="noopener noreferrer"
        >
          카카오톡 상담 시작하기
        </a>
      </div>

      <div class="notice">
        직접 클릭 시 카카오톡 오픈채팅으로 이동합니다.
      </div>
    </div>
  </div>

  <script>
    function calculateRecovery() {
      const lossAmount = parseFloat(document.getElementById("lossAmount").value);
      const profitRate = parseFloat(document.getElementById("profitRate").value);
      const result = document.getElementById("result");

      if (isNaN(lossAmount) || isNaN(profitRate) || lossAmount <= 0 || profitRate <= 0) {
        result.innerHTML = "올바른 금액과 수익률을 입력해 주세요.";
        return;
      }

      const requiredPrincipal = lossAmount / (profitRate / 100);
      const totalTarget = requiredPrincipal + lossAmount;

      result.innerHTML =
        "손실 복구에 필요한 원금: <strong>" + Math.round(requiredPrincipal).toLocaleString() + "원</strong><br>" +
        "목표 총 금액: <strong>" + Math.round(totalTarget).toLocaleString() + "원</strong>";
    }
  </script>
</body>
</html>
