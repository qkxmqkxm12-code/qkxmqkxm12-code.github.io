<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>손실금액 계산기</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      background: #181818;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .card {
      background: #222;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      font-size: 14px;
      margin-bottom: 6px;
      display: block;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border: none;
      border-radius: 10px;
      background: #333;
      color: #fff;
      font-size: 16px;
    }

    .calc-btn {
      width: 100%;
      padding: 14px;
      background: #2f80ed;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      background: #2b2b2b;
      padding: 15px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
    }

    .cta-box {
      background: #222;
      border-radius: 16px;
      padding: 20px;
      margin-top: 10px;
    }

    .kakao-btn {
      display: inline-block;
      width: 100%;
      padding: 18px;
      background: #fee500;
      color: #000;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .notice {
      font-size: 13px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>손실금액 계산기</h1>
    <p class="desc">손실 금액과 배팅 조건을 입력하면 복구 계획을 확인할 수 있습니다.</p>

    <div class="card">
      <label>손실 금액</label>
      <input type="number" id="lossAmount" placeholder="예: 100000">

      <label>목표 수익률 (%)</label>
      <input type="number" id="profitRate" placeholder="예: 10">

      <label>평균 배팅 금액</label>
      <input type="number" id="betAmount" placeholder="예: 10000">

      <button class="calc-btn" onclick="calculateRecovery()">계산하기</button>

      <div class="result" id="result">
        값을 입력하고 계산 버튼을 눌러주세요.
      </div>
    </div>

    <div class="cta-box">
      <div>추가 상담이 필요하시면</div>

      <a href="https://open.kakao.com/o/gdwQP0di" target="_blank" class="kakao-btn">
        카카오톡 상담 시작하기
      </a>

      <div class="notice">
        클릭 시 카카오톡 오픈채팅으로 이동합니다.
      </div>
    </div>
  </div>

  <script>
    function calculateRecovery() {
      const lossAmount = parseFloat(document.getElementById("lossAmount").value);
      const profitRate = parseFloat(document.getElementById("profitRate").value);
      const betAmount = parseFloat(document.getElementById("betAmount").value);
      const result = document.getElementById("result");

      if (
        isNaN(lossAmount) || isNaN(profitRate) || isNaN(betAmount) ||
        lossAmount <= 0 || profitRate <= 0 || betAmount <= 0
      ) {
        result.innerHTML = "올바른 값을 입력해주세요.";
        return;
      }

      const requiredPrincipal = lossAmount / (profitRate / 100);
      const totalTarget = requiredPrincipal + lossAmount;
      const profitPerBet = betAmount * (profitRate / 100);
      const betCount = requiredPrincipal / profitPerBet;

      result.innerHTML =
        "필요한 원금: <strong>" + Math.round(requiredPrincipal).toLocaleString() + "원</strong><br>" +
        "목표 총 금액: <strong>" + Math.round(totalTarget).toLocaleString() + "원</strong><br><br>" +
        "예상 배팅 횟수: <strong>" + Math.ceil(betCount) + "회</strong>";
    }
  </script>
</body>
</html>
