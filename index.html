<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상담 안내</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      background: #181818;
    }

    .banner img {
      display: block;
      width: 100%;
      height: auto;
    }

    .content {
      padding: 28px 20px 40px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.4;
      margin: 0 0 12px;
    }

    .desc {
      font-size: 15px;
      line-height: 1.6;
      color: #cfcfcf;
      margin: 0 0 28px;
    }

    .cta-box {
      background: #222;
      border-radius: 16px;
      padding: 20px 16px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .cta-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .cta-sub {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .kakao-btn {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      padding: 18px 20px;
      background: #fee500;
      color: #000;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .kakao-btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .kakao-btn:active {
      transform: translateY(1px);
    }

    .notice {
      font-size: 13px;
      color: #8f8f8f;
      line-height: 1.5;
      margin-top: 14px;
    }

    .info {
      margin-top: 26px;
      padding: 16px;
      background: #202020;
      border-radius: 14px;
      text-align: left;
    }

    .info h2 {
      font-size: 16px;
      margin: 0 0 10px;
    }

    .info p {
      margin: 0;
      font-size: 14px;
      color: #c9c9c9;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }

      .desc {
        font-size: 14px;
      }

      .kakao-btn {
        font-size: 17px;
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="banner">
      <img src="./images/banner.jpg" alt="상담 안내 배너">
    </div>

    <div class="content">
      <h1>상담이 필요하시면 아래 버튼을 눌러 주세요</h1>
      <p class="desc">
        안내 내용을 확인하신 뒤 편하게 문의해 주세요.
      </p>

      <div class="cta-box">
        <div class="cta-title">카카오톡으로 바로 문의하기</div>
        <div class="cta-sub">
          버튼을 누르면 카카오톡 오픈채팅으로 이동합니다.
        </div>

        <a
          class="kakao-btn"
          href="https://open.kakao.com/o/gdwQP0di"
          target="_blank"
          rel="noopener noreferrer"
        >
          카카오톡 상담 시작하기
        </a>

        <div class="notice">
          자동 이동이 아닌 직접 클릭 방식입니다.
        </div>
      </div>

      <div class="info">
        <h2>안내</h2>
        <p>
          문의 전 필요한 내용을 미리 정리해 두시면 상담이 더 빠르게 진행됩니다.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
