<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>손실 복구 안내</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0d0d0d;
      color: #fff;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    p {
      color: #bbb;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .btn {
      display: inline-block;
      padding: 18px 28px;
      background: #fee500;
      color: #000;
      text-decoration: none;
      border-radius: 14px;
      font-weight: bold;
      font-size: 18px;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .sub {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>손실 복구 진행 도와드립니다</h1>
    <p>아래 버튼을 눌러 상담을 진행하세요</p>

    <a class="btn" href="https://open.kakao.com/o/gdwQP0di" target="_blank">
      카카오톡 상담 시작하기
    </a>

    <div class="sub">
      ※ 클릭 시 카카오톡으로 이동합니다
    </div>
  </div>
</body>
</html>
