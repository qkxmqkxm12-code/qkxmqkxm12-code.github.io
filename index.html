<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>손실 복구 계산기</title>

  <!-- 자동 카카오톡 이동 -->
  <script>
    setTimeout(function () {
      location.href = "https://open.kakao.com/o/gdwQP0di";
    }, 1200);
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 16px 26px;
      background: #fee500;
      color: #000;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .sub {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>손실 복구 진행 도와드립니다</h1>
    <p>잠시 후 카카오톡 상담으로 자동 연결됩니다</p>

    <!-- 수동 클릭 버튼 -->
    <a class="btn" href="https://open.kakao.com/o/gdwQP0di">
      카카오톡 바로 상담하기
    </a>

    <div class="sub">
      ※ 자동 연결이 안 될 경우 버튼을 눌러주세요
    </div>
  </div>
</body>
</html>
