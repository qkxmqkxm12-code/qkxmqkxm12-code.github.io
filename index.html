<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>손실 복구 계산기</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
}

.container {
  margin-top: 50px;
}

h1 {
  font-size: 32px;
  color: orange;
}

input {
  padding: 12px;
  margin: 10px;
  width: 250px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 14px 25px;
  margin-top: 10px;
  background: linear-gradient(45deg, orange, red);
  border: none;
  font-size: 18px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.result {
  margin-top: 25px;
  font-size: 22px;
  color: #00ff88;
}

.warning {
  margin-top: 30px;
  color: yellow;
  font-size: 16px;
}

</style>
</head>

<body>

<div class="container">
  <h1>손실 복구 계산기</h1>

  <input id="count" type="number" placeholder="최근 낙첨 폴더 수">
  <br>
  <input id="amount" type="number" placeholder="평균 배팅 금액 (원)">
  <br>

  <button onclick="calc()">복구 금액 계산하기</button>

  <div class="result" id="result"></div>

  <div class="warning">
    ⚠ 계산 안 하면 손실 계속 커집니다
  </div>
</div>

<script>
function calc(){
  let count = parseInt(document.getElementById("count").value);
  let amount = parseInt(document.getElementById("amount").value);

  if(!count || !amount){
    alert("값을 입력해주세요");
    return;
  }

  let loss = count * amount;

  // 복구 계산 (배당 고려 간단 모델)
  let recovery = loss * 2;

  document.getElementById("result").innerHTML =
    "손실 금액: " + loss.toLocaleString() + "원<br>" +
    "복구 필요 금액: " + recovery.toLocaleString() + "원<br><br>" +
    "👉 지금 복구 전략 확인하기";
}
</script>

</body>
</html>
